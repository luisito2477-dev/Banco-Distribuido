# Nombre del servicio (como lo vera Eureka)
spring.application.name=auth-service

# Puerto en el que va a correr este microservicio
server.port=8081

# Configuracion de la DB
spring.datasource.url=jdbc:postgresql://localhost:5432/bank_auth_db
spring.datasource.username=bank_user
spring.datasource.password=bank_password
spring.datasource.driver-class-name=org.postgresql.Driver

# Configuracion de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Direccion del servidor de Eureka para registrarse
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
