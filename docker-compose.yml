version: '3.8'

services:

  # 1. Base de datos
  postgres-db:
    image: postgres:15-alpine
    container_name: bank-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: bank_user
      POSTGRES_PASSWORD: bank_password
      POSTGRES_DB: bank_auth_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bank-network

  # Redis
  redis-cache:
    image: redis:7-alpine
    container_name: bank-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - bank-network

  # RabbitMQ
  rabbitmq-broker:
    image: rabbitmq:3-management-alpine
    container_name: bank-rabbitmq
    ports:
      - "5672:5672"  # Puerto de comunicacion de datos (AMQP)
      - "15672:15672"  # Panel de control web (Dashboard)
    environment:
      RABBITMQ_DEFAULT_USER: bank_admin
      RABBITMQ_DEFAULT_PASS: bank_admin_pass
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - bank-network

  # Mailpit (Servidor de correos local para pruebas )
  mailpit:
    image: axllent/mailpit
    container_name: bank-mailpit
    ports:
      - "1025:1025"  # Puerto SMTP para que Spring Boot mande correos
      - "8025:8025"  # Interfaz web para ver los correos recibidos
    networks:
      - bank-network

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  bank-network:
    driver: bridge
